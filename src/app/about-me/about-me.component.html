<section class="about-me">
  <div class="title-section">
    <h2 class="section-title">Über Mich</h2>
    <p class="section-subtitle">
      Ein Einblick in meine Leidenschaften und Interessen
    </p>
  </div>

  <div class="carousel-container">
    <button class="nav-button prev" (click)="previousSlide()">
      <span class="arrow">&lt;</span>
    </button>

    <div class="carousel-content">
      <div class="section-icon">{{ sections[currentIndex].icon }}</div>
      <h3>{{ sections[currentIndex].title }}</h3>

      <!-- Neuer Einführungstext -->
      <div class="section-intro">
        <p>{{ sections[currentIndex].introduction }}</p>
      </div>

      <div class="section-content">
        <ul>
          <li *ngFor="let line of getContent(sections[currentIndex].content)">
            {{ line }}
          </li>
        </ul>
      </div>
    </div>

    <button class="nav-button next" (click)="nextSlide()">
      <span class="arrow">&gt;</span>
    </button>
  </div>

  <!-- Navigation Dots -->
  <div class="carousel-dots">
    <span
      *ngFor="let section of sections; let i = index"
      [class.active]="i === currentIndex"
      (click)="currentIndex = i"
      [attr.title]="section.title"
    >
    </span>
  </div>
</section>
